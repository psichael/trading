type: list
status: draft
content: '- **Structure & Naming:** All files and directories must conform to the
  `[index]_[uuid]_[slug]` naming convention. Every directory must contain a `_topic.manifest.yaml`
  file.

  - **UUID Integrity:** All `id` fields within YAML files must be valid UUIDs. UUIDs
  must be unique across the entire knowledge base.

  - **Content & Abstraction:** Every `.doc.yaml` must contain one indivisible idea.
  Information must flow from general to specific as one descends the tree.

  - **Manifest Governance:** A manifest `abstract` must accurately summarize its direct
  children. Its `relations` can only link to other topic UUIDs.'
