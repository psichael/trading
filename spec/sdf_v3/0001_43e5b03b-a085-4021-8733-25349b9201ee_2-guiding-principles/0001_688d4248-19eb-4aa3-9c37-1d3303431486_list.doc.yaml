type: list
status: draft
content: '- **AI-First, Not AI-Only:** The primary consumer is the DDI-O agent. The
  representation is optimized for machine traversal, querying, and manipulation. Humans
  act as supervisors.

  - **Atomic Idea Units:** Each file contains one and only one indivisible semantic
  unit.

  - **Structure as Semantics:** The physical directory hierarchy represents the logical
  structure of the knowledge.

  - **UUID as Identity:** An item''s identity is a unique, immutable UUID, completely
  decoupled from its filename or position in a sequence. This allows for robust cross-referencing
  and transactional safety during reordering operations.

  - **Explicit Governance:** High-level intent, ownership, and architectural relationships
  are explicitly declared in machine-readable manifest files.'
